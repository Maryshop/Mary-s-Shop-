<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mary's Shop | تسجيل الدخول</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="neon-bg"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>✨ Mary's Shop ✨</h1>
                <p>تسجيل الدخول إلى لوحة التحكم</p>
            </div>
            
            <form id="login-form">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="البريد الإلكتروني" required>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login-password" placeholder="كلمة المرور" required>
                </div>
                
                <button type="submit" class="btn-primary btn-full">
                    <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                </button>
            </form>
            
            <div class="login-footer">
                <p>ليس لديك حساب؟ <a href="#" id="show-register">إنشاء حساب جديد</a></p>
            </div>
        </div>
        
        <div class="register-card" style="display: none;">
            <div class="login-header">
                <h1>✨ Mary's Shop ✨</h1>
                <p>إنشاء حساب جديد</p>
            </div>
            
            <form id="register-form">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="register-name" placeholder="الاسم الكامل" required>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="register-email" placeholder="البريد الإلكتروني" required>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="register-password" placeholder="كلمة المرور" required>
                </div>
                
                <button type="submit" class="btn-primary btn-full">
                    <i class="fas fa-user-plus"></i> إنشاء حساب
                </button>
            </form>
            
            <div class="login-footer">
                <p>لديك حساب بالفعل؟ <a href="#" id="show-login">تسجيل الدخول</a></p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
