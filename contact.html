<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mary's Shop | تواصل معنا</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><h1>✨ Mary's Shop ✨</h1></div>
            <ul class="nav-links">
                <li><a href="index.html"><i class="fas fa-home"></i> الرئيسية</a></li>
                <li><a href="shop.html"><i class="fas fa-gem"></i> الجواهر</a></li>
                <li><a href="accounts.html"><i class="fas fa-user"></i> الحسابات</a></li>
                <li><a href="services.html"><i class="fas fa-bolt"></i> الخدمات</a></li>
                <li><a href="posts.html"><i class="fas fa-newspaper"></i> المنشورات</a></li>
                <li><a href="contact.html" class="active"><i class="fas fa-envelope"></i> تواصل</a></li>
            </ul>
            <div class="nav-buttons">
                <a href="login.html" class="btn-login"><i class="fas fa-user"></i> دخول</a>
            </div>
        </div>
    </nav>

    <main>
        <section class="contact-section">
            <div class="container">
                <h2 class="section-title">📞 تواصل معنا 📞</h2>
                
                <div class="contact-grid">
                    <div class="contact-info">
                        <div class="contact-card-large">
                            <i class="fab fa-facebook"></i>
                            <h3>فيسبوك</h3>
                            <p>تواصل معنا عبر صفحتنا الرسمية</p>
                            <a href="https://www.facebook.com/profile.php?id=61579964320318" target="_blank" class="btn-contact-large">
                                <i class="fab fa-facebook"></i> راسلنا على فيسبوك
                            </a>
                        </div>
                        
                        <div class="contact-card-large">
                            <i class="fab fa-instagram"></i>
                            <h3>إنستغرام</h3>
                            <p>تابعنا على إنستغرام للعروض الحصرية</p>
                            <a href="#" class="btn-contact-large instagram">
                                <i class="fab fa-instagram"></i> تابعنا
                            </a>
                        </div>
                        
                        <div class="contact-card-large">
                            <i class="fab fa-whatsapp"></i>
                            <h3>واتساب</h3>
                            <p>للتواصل السريع والدعم الفني</p>
                            <a href="#" class="btn-contact-large whatsapp">
                                <i class="fab fa-whatsapp"></i> تواصل عبر واتساب
                            </a>
                        </div>
                    </div>
                    
                    <div class="contact-form-card">
                        <h3>📧 أرسل لنا رسالة</h3>
                        <form id="contact-form">
                            <input type="text" placeholder="الاسم الكامل" required>
                            <input type="email" placeholder="البريد الإلكتروني" required>
                            <input type="text" placeholder="رقم الهاتف (اختياري)">
                            <textarea rows="5" placeholder="رسالتك..."></textarea>
                            <button type="submit" class="btn-primary btn-full">إرسال الرسالة</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
